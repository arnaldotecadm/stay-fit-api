name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main       # → stay-fit-prod
      - develop    # → StayFit-env

env:
  AWS_REGION: eu-north-1
  APP_NAME: Stay Fit

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: gradle

      - name: Build application
        run: ./gradlew stage

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          LABEL="${TIMESTAMP}-${SHORT_SHA}"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=stay-fit-prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=StayFit-env" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and upload to S3
        run: |
          cp api/build/libs/api.jar api.jar
          zip deploy.zip api.jar Procfile .ebextensions/
          aws s3 cp deploy.zip "s3://${{ vars.EB_S3_BUCKET }}/stay-fit-api/${{ steps.meta.outputs.label }}.zip"

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.APP_NAME }}" \
            --version-label "${{ steps.meta.outputs.label }}" \
            --source-bundle S3Bucket="${{ vars.EB_S3_BUCKET }}",S3Key="stay-fit-api/${{ steps.meta.outputs.label }}.zip" \
            --no-auto-create-application

          aws elasticbeanstalk update-environment \
            --application-name "${{ env.APP_NAME }}" \
            --environment-name "${{ steps.meta.outputs.environment }}" \
            --version-label "${{ steps.meta.outputs.label }}"


