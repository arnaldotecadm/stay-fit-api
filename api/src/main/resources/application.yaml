spring:
  datasource:
    url: jdbc:postgresql://db.ajxfmisrejplgpwvjswt.supabase.co:5432/postgres
    driverClassName: org.postgresql.Driver
    username: postgres
    password: "@ADMINar9850"

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        type: trace
        default_schema: stay_fit
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  flyway:
    enabled: false
    locations: classpath:db/migration

cloud:
  aws:
    region:
      static: ${AWS_REGION:eu-north-1}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:local}
      secret-key: ${AWS_SECRET_ACCESS_KEY:local}
    sqs:
      endpoint-override: ${AWS_SQS_ENDPOINT_OVERRIDE:}
      max-concurrent-messages: ${SQS_MAX_CONCURRENT_MESSAGES:10}
      max-messages-per-poll: ${SQS_MAX_MESSAGES_PER_POLL:10}
      heart-rate-series-queue:
        url: ${AWS_SQS_HEART_RATE_SERIES_QUEUE_URL:https://sqs.eu-north-1.amazonaws.com/000000000000/HeartRateSeriesQueue}
      sleep-session-queue:
        url: ${AWS_SQS_SLEEP_SESSION_QUEUE_URL:https://sqs.eu-north-1.amazonaws.com/000000000000/SleepSessionQueue}
      exercise-session-queue:
        url: ${AWS_SQS_EXERCISE_SESSION_QUEUE_URL:https://sqs.eu-north-1.amazonaws.com/000000000000/ExerciseSessionQueue}
      daily-summary-queue:
        url: ${AWS_SQS_DAILY_SUMMARY_QUEUE_URL:https://sqs.eu-north-1.amazonaws.com/000000000000/DailySummaryQueue}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG