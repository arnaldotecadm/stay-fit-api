name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main       # → stay-fit-prod
      - develop    # → stay-fit-staging

env:
  AWS_REGION: eu-north-1
  TF_WORKING_DIR: infra

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: gradle

      - name: Build application
        run: ./gradlew stage

      - name: Resolve deployment metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          LABEL="${TIMESTAMP}-${SHORT_SHA}"
          echo "label=${LABEL}" >> "$GITHUB_OUTPUT"
          echo "s3_key=stay-fit-api/${LABEL}.zip" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=stay-fit-prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=stay-fit-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and upload deployment bundle
        run: |
          cp api/build/libs/api.jar api.jar
          zip -r deploy.zip api.jar Procfile .ebextensions/
          aws s3 cp deploy.zip "s3://${{ vars.EB_S3_BUCKET }}/${{ steps.meta.outputs.s3_key }}"

      # ── Infrastructure changes (Terraform) ──────────────────────────────────
      # Only runs when infra files change. Does NOT update the app version.
      - name: Detect infra changes
        id: infra_changes
        run: |
          git diff --name-only HEAD~1 HEAD | grep -q '^infra/' && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        if: steps.infra_changes.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        if: steps.infra_changes.outputs.changed == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.EB_S3_BUCKET }}" \
            -backend-config="key=terraform-state/${{ steps.meta.outputs.environment }}/terraform.tfstate"

      - name: Terraform Apply
        if: steps.infra_changes.outputs.changed == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_environment_name: ${{ steps.meta.outputs.environment }}
          TF_VAR_s3_bucket:        ${{ vars.EB_S3_BUCKET }}
          TF_VAR_s3_key:           ${{ steps.meta.outputs.s3_key }}
          TF_VAR_version_label:    ${{ steps.meta.outputs.label }}
          TF_VAR_db_host:          ${{ secrets.DATABASE_HOST }}
          TF_VAR_db_port:          ${{ secrets.DATABASE_PORT }}
          TF_VAR_db_name:          ${{ secrets.DATABASE_NAME }}
          TF_VAR_db_username:      ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          TF_VAR_db_password:      ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        run: terraform apply -auto-approve

      # ── App-only deployment (fast path) ─────────────────────────────────────
      # Runs on every push. Creates a new app version and swaps it in — no env churn.
      - name: Deploy new app version
        if: steps.infra_changes.outputs.changed != 'true'
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name stay-fit-api \
            --version-label "${{ steps.meta.outputs.label }}" \
            --source-bundle S3Bucket="${{ vars.EB_S3_BUCKET }}",S3Key="${{ steps.meta.outputs.s3_key }}" \
            --no-auto-create-application

          aws elasticbeanstalk update-environment \
            --environment-name "${{ steps.meta.outputs.environment }}" \
            --version-label "${{ steps.meta.outputs.label }}"

