name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main        # → stay-fit-prod
      - develop     # → stay-fit-staging

env:
  AWS_REGION: eu-north-1
  EB_APPLICATION: stay-fit-api

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: gradle

      - name: Build application
        run: ./gradlew stage

      - name: Resolve deployment metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "label=${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=stay-fit-prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=stay-fit-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Package deployment bundle
        run: |
          # Copy the Spring Boot fat JAR to project root as api.jar
          cp api/build/libs/api.jar api.jar

          # Bundle JAR + Procfile + EB config into a ZIP
          zip -r deploy.zip api.jar Procfile .ebextensions/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Upload bundle to S3
        run: |
          S3_BUCKET="${{ vars.EB_S3_BUCKET }}"
          LABEL="${{ steps.meta.outputs.label }}"
          aws s3 cp deploy.zip "s3://${S3_BUCKET}/stay-fit-api/${LABEL}.zip"
          echo "S3_KEY=stay-fit-api/${LABEL}.zip" >> "$GITHUB_ENV"
          echo "LABEL=${LABEL}" >> "$GITHUB_ENV"

      - name: Create new EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APPLICATION }}" \
            --version-label "${{ env.LABEL }}" \
            --source-bundle S3Bucket="${{ vars.EB_S3_BUCKET }}",S3Key="${{ env.S3_KEY }}" \
            --auto-create-application

      - name: Ensure EC2 instance profile exists
        run: |
          # EB needs an *instance profile* (not just the role) attached to EC2 instances.
          # The role aws-elasticbeanstalk-ec2-role already exists; we just need to make sure
          # the instance profile of the same name exists and has the role attached.
          # We attempt creation and treat EntityAlreadyExists as a no-op.
          if aws iam create-instance-profile \
              --instance-profile-name aws-elasticbeanstalk-ec2-role 2>&1 \
              | grep -q "EntityAlreadyExists"; then
            echo "Instance profile already exists — skipping."
          else
            echo "Instance profile created. Attaching role..."
            aws iam add-role-to-instance-profile \
              --instance-profile-name aws-elasticbeanstalk-ec2-role \
              --role-name aws-elasticbeanstalk-ec2-role

            echo "Waiting for instance profile to propagate..."
            sleep 10
          fi

      - name: Create or update Elastic Beanstalk environment
        run: |
          ENV_NAME="${{ steps.meta.outputs.environment }}"
          APP_NAME="${{ env.EB_APPLICATION }}"

          OPTION_SETTINGS=(
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SPRING_DATASOURCE_USERNAME,Value=${{ secrets.SPRING_DATASOURCE_USERNAME }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=SPRING_DATASOURCE_PASSWORD,Value=${{ secrets.SPRING_DATASOURCE_PASSWORD }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=DATABASE_HOST,Value=${{ secrets.DATABASE_HOST }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=DATABASE_PORT,Value=${{ secrets.DATABASE_PORT }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=DATABASE_NAME,Value=${{ secrets.DATABASE_NAME }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_ACCESS_KEY_ID,Value=${{ secrets.AWS_ACCESS_KEY_ID }}"
            "Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_SECRET_ACCESS_KEY,Value=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            "Namespace=aws:elasticbeanstalk:environment,OptionName=ServiceRole,Value=ElasticBeanStalkServiceRole"
            "Namespace=aws:autoscaling:launchconfiguration,OptionName=IamInstanceProfile,Value=aws-elasticbeanstalk-ec2-role"
            "Namespace=aws:autoscaling:launchconfiguration,OptionName=EC2KeyName,Value=stay-fit-keypair"
          )

          # Check whether the environment already exists and is not Terminated
          STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name "$APP_NAME" \
            --environment-names "$ENV_NAME" \
            --query "Environments[0].Status" \
            --output text 2>/dev/null || echo "None")

          echo "Current environment status: ${STATUS}"

          if [[ "$STATUS" == "None" || "$STATUS" == "Terminated" || "$STATUS" == "null" ]]; then
            echo "Environment does not exist — creating it..."

            # Resolve the latest Java SE (Corretto 21 / Amazon Linux 2023) solution stack.
            # Explicitly exclude Tomcat: on Tomcat platforms EB ignores server.port and always
            # binds to 8080 internally. Java SE platforms honour the PORT env var / Procfile.
            SOLUTION_STACK=$(aws elasticbeanstalk list-available-solution-stacks \
              --query "SolutionStacks[?contains(@,'Corretto 21') && contains(@,'Amazon Linux 2023') && !contains(@,'Tomcat')] | [0]" \
              --output text)
            echo "Using solution stack: ${SOLUTION_STACK}"

            aws elasticbeanstalk create-environment \
              --application-name "$APP_NAME" \
              --environment-name "$ENV_NAME" \
              --solution-stack-name "$SOLUTION_STACK" \
              --version-label "${{ env.LABEL }}" \
              --option-settings "${OPTION_SETTINGS[@]}"
          else
            echo "Environment exists — updating it..."

            aws elasticbeanstalk update-environment \
              --application-name "$APP_NAME" \
              --environment-name "$ENV_NAME" \
              --version-label "${{ env.LABEL }}" \
              --option-settings "${OPTION_SETTINGS[@]}"
          fi

      - name: Wait for environment to become healthy
        run: |
          ENV_NAME="${{ steps.meta.outputs.environment }}"
          echo "Waiting for ${ENV_NAME} to be Ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ env.EB_APPLICATION }}" \
            --environment-names "$ENV_NAME"
          echo "Deployment complete."
